<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Hub Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hub-dark': '#0a0a0b',
                        'hub-card': '#111113',
                        'hub-border': '#1f1f23',
                        'hub-input': '#18181b',
                        'hub-accent': '#10b981',
                        'hub-accent-hover': '#059669',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-focus:focus {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .card-glow {
            box-shadow: 0 0 60px rgba(16, 185, 129, 0.05), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body class="min-h-screen bg-hub-dark flex items-center justify-center p-4">
    <!-- Background pattern -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-hub-accent/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-hub-accent/3 rounded-full blur-3xl"></div>
    </div>

    <!-- Main container -->
    <div class="relative z-10 w-full max-w-md">
        <!-- Logo/Brand section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-hub-accent/10 border border-hub-accent/20 rounded-xl mb-4">
                <svg class="w-7 h-7 text-hub-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Identity Hub</h1>
            <p class="text-zinc-500 text-sm mt-1">Privacy-preserving identity management</p>
        </div>

        <!-- Card -->
        <div class="bg-hub-card border border-hub-border rounded-2xl p-8 card-glow">
            <!-- Card header -->
            <div class="text-center mb-6">
                <h2 class="text-lg font-semibold text-white">Welcome back</h2>
                <p class="text-zinc-500 text-sm mt-1">Sign in to your secure account</p>
            </div>

            <!-- Form -->
            <div class="space-y-4">
                <!-- Username field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-zinc-400 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Enter your username"
                            class="w-full bg-hub-input border border-hub-border rounded-xl py-3 pl-11 pr-4 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-hub-accent/50 input-focus transition-all duration-200"
                        >
                    </div>
                </div>

                <!-- Password field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password"
                            class="w-full bg-hub-input border border-hub-border rounded-xl py-3 pl-11 pr-4 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-hub-accent/50 input-focus transition-all duration-200"
                        >
                    </div>
                </div>

                <!-- Message area -->
                <div id="msg" class="text-center text-sm min-h-[20px] text-red-400"></div>

                <!-- Buttons -->
                <div class="space-y-3 pt-2">
                    <button 
                        onclick="login()"
                        class="w-full bg-hub-accent hover:bg-hub-accent-hover text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 btn-glow flex items-center justify-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        Sign In
                    </button>
                    
                    <button 
                        onclick="register()"
                        class="w-full bg-transparent border border-hub-border hover:border-hub-accent/50 hover:bg-hub-accent/5 text-zinc-300 hover:text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                        </svg>
                        Create Account
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center">
            <p class="text-zinc-600 text-xs">
                Protected by end-to-end encryption
            </p>
            <div class="flex items-center justify-center gap-1 mt-2">
                <svg class="w-4 h-4 text-hub-accent" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <span class="text-zinc-500 text-xs">Zero-knowledge architecture</span>
            </div>
        </div>
    </div>

    <script>
        const BASE = "http://127.0.0.1:7000";

        async function register() {
            const res = await fetch(BASE + "/register-user", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })
            });

            const data = await res.json();

            if (data.status === "registered") {
                localStorage.setItem("user", username.value);
                localStorage.setItem("profile_complete", "no");
                window.location = "profile.html";
            }
            else if (data.status === "exists") {
                msg.innerText = "User already exists. Please login.";
            }
        }

        async function login() {
            const res = await fetch(BASE + "/login-user", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })
            });

            const data = await res.json();

            if (data.status === "success") {
                localStorage.setItem("user", username.value);

                if (localStorage.getItem(username.value + "_profile") === "yes") {
                    window.location = "dashboard.html";
                } else {
                    window.location = "profile.html";
                }
            } else {
                msg.innerText = "Invalid login";
            }
        }
    </script>
</body>
</html>
